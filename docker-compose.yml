version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taxi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taxi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      retries: 5

  user-service:
    build: ./user-service
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taxi
      SPRING_DATASOURCE_USERNAME: user_service
      SPRING_DATASOURCE_PASSWORD: user_pass
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  trip-service:
    build: ./trip-service
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taxi
      SPRING_DATASOURCE_USERNAME: trip_service
      SPRING_DATASOURCE_PASSWORD: trip_pass
      USER_SERVICE_URL: http://user-service:8080
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  notification-service:
    build: ./notification-service
    ports:
      - "8083:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taxi
      SPRING_DATASOURCE_USERNAME: notification_service
      SPRING_DATASOURCE_PASSWORD: notif_pass
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://user-service:8080
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://user-service:8080
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://trip-service:8080
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://notification-service:8080
    depends_on:
      - user-service
      - trip-service
      - notification-service
